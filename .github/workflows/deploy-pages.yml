# Deploy static Three.js kiosk from src/frontend to GitHub Pages.
#
# First-time setup (required once, or deploy will fail):
#   Repository Settings → Pages → Build and deployment → Source: "GitHub Actions"
# Do not use "Deploy from a branch" while this workflow is your publisher.
#
# This workflow intentionally does NOT use actions/configure-pages: that step calls
# GET /repos/{owner}/{repo}/pages and returns 404 until Pages is enabled as above.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/frontend

      - id: deployment
        uses: actions/deploy-pages@v4
