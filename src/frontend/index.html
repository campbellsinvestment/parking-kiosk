<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Parking Kiosk</title>
    <link rel="stylesheet" href="./styles.css?v=help-settings-2026-05" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas
      id="c"
      tabindex="0"
      aria-label="Parking kiosk. Arrows drive. V toggles free camera (drag, pan, zoom). Click a car to select. Escape closes pop-out."
    ></canvas>
    <button
      type="button"
      id="help-settings"
      class="help-settings"
      aria-label="Show keyboard and camera instructions"
      title="Instructions"
    >
      <svg class="help-settings__icon" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          fill="currentColor"
          d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.31-.08.63-.08.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
        />
      </svg>
    </button>
    <div id="drive-hint" class="drive-hint" aria-hidden="false">
      <div class="drive-hint__panel">
        <div class="drive-hint__arrows" aria-hidden="true">
          <span class="drive-hint__chev drive-hint__chev--up">▲</span>
          <div class="drive-hint__mid">
            <span class="drive-hint__chev">◀</span>
            <span class="drive-hint__chev">▶</span>
          </div>
          <span class="drive-hint__chev drive-hint__chev--down">▼</span>
        </div>
        <p class="drive-hint__caption">
          <strong>Arrow keys</strong> drive the car.<br />
          Press <kbd class="drive-hint__kbd">V</kbd> for free camera, then <strong>drag</strong> to look (wheel zoom, right-drag pan).
        </p>
      </div>
    </div>
    <div
      id="park-celebration"
      class="park-celebration park-celebration--hidden"
      aria-hidden="true"
      role="dialog"
      aria-labelledby="park-celebration-title"
    >
      <div class="park-celebration__panel">
        <div class="park-celebration__check" aria-hidden="true">✓</div>
        <h2 id="park-celebration-title" class="park-celebration__title">Parked</h2>
        <p class="park-celebration__lead">You are in your space. Entry gate is down.</p>
        <p class="park-celebration__hint">
          Click a car to select it, then arrow keys to drive. To leave, use an exit kiosk screen.
        </p>
        <button type="button" id="park-celebration-ok" class="park-celebration__ok">Got it</button>
      </div>
    </div>
    <div id="kiosk-popout" class="kiosk-popout kiosk-popout--hidden" aria-hidden="true">
      <div class="kiosk-popout__frame">
        <canvas id="kiosk-popout-canvas" width="960" height="540" class="kiosk-popout__screen"></canvas>
      </div>
    </div>
    <script type="module" src="./main.js?v=exit-driveout-sunny-2026-05"></script>
  </body>
</html>
