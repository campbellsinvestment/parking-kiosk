
<div id="erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  TICKETS {
    uuid id PK
    int kiosk_id FK
    datetime entry_time
    datetime exit_time
    varchar status
    varchar qr_code
  }
  TRANSACTIONS {
    uuid id PK
    uuid ticket_id FK
    decimal base_fee
    decimal tax_amount
    decimal total_amount
    varchar status
    varchar gateway_ref
    datetime created_at
  }
  KIOSKS {
    int id PK
    varchar type
    varchar status
    bool is_paper_low
    bool is_online
    datetime last_health_check
  }
  GATES {
    int id PK
    int kiosk_id FK
    varchar state
    datetime last_changed
    varchar overridden_by
  }
  RATE_SCHEDULES {
    int id PK
    int free_period_min
    decimal tier1_rate
    decimal tier2_rate
    decimal extra_hour_rate
    decimal tax_rate
    bool is_active
    datetime updated_at
  }
  ERROR_LOGS {
    int id PK
    int kiosk_id FK
    varchar error_code
    text description
    datetime timestamp
    bool resolved
  }
  AUDIT_LOGS {
    int id PK
    varchar admin_id
    varchar action
    text details
    datetime timestamp
  }
  TICKETS ||--o{ TRANSACTIONS : "has"
  KIOSKS ||--o{ TICKETS : "issues"
  KIOSKS ||--|| GATES : "controls"
  KIOSKS ||--o{ ERROR_LOGS : "generates"
  GATES }o--o{ AUDIT_LOGS : "logged in"
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]];
  const ys = [nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x);rect.setAttribute('y',y);
  rect.setAttribute('width',w);rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style'])
    if(firstPath.hasAttribute(a))rect.setAttribute(a,firstPath.getAttribute(a));
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path,#erd svg .row-rect-even path').forEach(p=>{
  p.setAttribute('stroke','none');
});
</script>
